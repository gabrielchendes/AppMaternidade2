<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maternidade Premium</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f0f0f" />
  </head>
  <body>
    <script>
      // Fix for libraries that try to overwrite window.fetch
      if (typeof window !== 'undefined' && window.fetch) {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => { 
              console.warn('Attempted to overwrite window.fetch with:', v);
              // Do nothing, keep original fetch
            }
          });
        } catch (e) {
          // Already read-only or other issue
        }
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
